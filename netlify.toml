[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/maintenance"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/maintenance/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
