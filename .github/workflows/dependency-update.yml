name: Dependency Review

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update non-breaking dependencies
        run: npm update

      - name: Validate update
        run: |
          npm run check
          npm run build
          npm run test:headers
          npm run audit

      - name: Create reviewed dependency PR
        uses: peter-evans/create-pull-request@4e1beaa7521e8b457b572c090b25bd3db56bf1c5
        with:
          commit-message: "chore: update reviewed dependencies"
          title: "Reviewed dependency updates"
          body: |
            Automated non-breaking dependency update.

            Validation run:
            - npm run check
            - npm run build
            - npm run test:headers
            - npm run audit
          branch: dependency-updates
          delete-branch: true
